services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/tax_return.db
      - ENCRYPTION_KEY_PATH=data/.encryption_key
      - CORS_ORIGINS=http://localhost:${FRONTEND_PORT:-3000}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend
    restart: unless-stopped
